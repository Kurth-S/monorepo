# Usamos LabRole en vez de dejar que eksctl cree roles nuevos, porque el
# Learner Lab no da permiso para crear IAM roles. Reemplazar <ACCOUNT_ID>
# en las dos líneas de abajo. Key pair "vockey" es la que trae el lab por
# default; si en su lab se llama distinto, cambiarla.
#
# Probar esto primero. Si create cluster tira error de IAM, toca pasarse
# a ECS Fargate.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: innovatech-cluster
  region: us-east-1
  version: "1.29"

iam:
  serviceRoleARN: arn:aws:iam::<ACCOUNT_ID>:role/LabRole

managedNodeGroups:
  - name: innovatech-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    ssh:
      allow: true
      publicKeyName: vockey
    iam:
      instanceRoleARN: arn:aws:iam::<ACCOUNT_ID>:role/LabRole
    labels:
      role: innovatech-workload

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator"]
