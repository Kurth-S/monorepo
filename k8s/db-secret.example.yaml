# Solo de referencia, no subir con valores reales. El secret de verdad se
# crea con kubectl create secret (comando abajo) o desde el pipeline.
#
# kubectl create secret generic db-credentials -n innovatech \
#   --from-literal=DB_ENDPOINT=<endpoint-de-tu-RDS> \
#   --from-literal=DB_PORT=3306 \
#   --from-literal=DB_NAME=innovatech \
#   --from-literal=DB_USERNAME=admin \
#   --from-literal=DB_PASSWORD=<password>

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: innovatech
type: Opaque
stringData:
  DB_ENDPOINT: "REEMPLAZAR"
  DB_PORT: "3306"
  DB_NAME: "innovatech"
  DB_USERNAME: "REEMPLAZAR"
  DB_PASSWORD: "REEMPLAZAR"
