apiVersion: apps/v1
kind: Deployment
metadata:
  name: despacho-back
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despacho-back
  template:
    metadata:
      labels:
        app: despacho-back
    spec:
      containers:
        - name: despacho-back
          # La CI/CD reemplaza este tag en cada deploy (ver workflow de GitHub Actions)
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/innovatech-despacho:latest
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: db-credentials
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/despachos
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/despachos
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: despacho-back
  namespace: innovatech
spec:
  selector:
    app: despacho-back
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
