# 60% CPU como umbral: las APIs hacen CRUD simple, así que en reposo el uso
# es bajo. 60% da margen para picos sin escalar antes de tiempo. Min 2
# réplicas para no quedar sin servicio si se cae un pod.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: despacho-back-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: despacho-back
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
